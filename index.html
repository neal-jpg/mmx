<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>MMX Pro Timer</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
    background-color: #111111; 
    color: #ffffff; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    justify-content: space-between; 
    height: 100vh; 
    padding: calc(20px + env(safe-area-inset-top)) 20px calc(20px + env(safe-area-inset-bottom)) 20px;
    text-align: center; 
    overflow: hidden;
  }
  .header-zone { width: 100%; }
  #round {
    font-size: 5vw;
    max-size: 1.5rem;
    color: #00ccff;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: bold;
  }
  #exercise { 
    font-size: 7vw;
    font-weight: bold;
    margin-top: 10px;
    line-height: 1.2;
    min-height: 2.4em;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .timer-container {
    position: relative;
    width: 65vw;
    height: 65vw;
    max-width: 280px;
    max-height: 280px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .progress-ring {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }
  #timer { 
    font-size: 16vw; 
    max-font-size: 5rem;
    font-weight: bold; 
    font-variant-numeric: tabular-nums;
    z-index: 2;
  }
  .footer-zone { width: 100%; }
  #next-exercise { 
    font-size: 4vw; 
    color: #aaaaaa; 
    margin-bottom: 15px; 
    min-height: 1.2em;
  }
  .btn-container {
    display: flex;
    gap: 10px;
    width: 100%;
    max-width: 400px;
    margin: 0 auto;
  }
  button { 
    color: white; 
    border: none; 
    padding: 15px 0; 
    font-size: 4.5vw; 
    font-weight: bold;
    cursor: pointer; 
    border-radius: 10px; 
    text-transform: uppercase; 
    flex: 1;
    min-width: 0;
  }
  #start-btn { background-color: #ff3333; flex: 2; }
  #pause-btn { display: none; background-color: #444444; flex: 2; }
  .nav-btn { background-color: #222222; border: 1px solid #333333; }
</style>
</head>
<body>
  <div class="header-zone">
    <div id="round">P90X3 MMX</div>
    <div id="exercise">Ready to Work?</div>
  </div>
  
  <div class="timer-container">
    <svg class="progress-ring" viewBox="0 0 200 200">
      <circle stroke="rgba(255, 255, 255, 0.08)" stroke-width="8" fill="transparent" r="85" cx="100" cy="100"/>
      <circle id="moving-bar" stroke="#ffffff" stroke-width="8" fill="transparent" r="85" cx="100" cy="100" stroke-linecap="round" style="transition: stroke-dashoffset 1s linear, stroke 0.3s ease;"/>
    </svg>
    <div id="timer">00:00</div>
  </div>

  <div class="footer-zone">
    <div id="next-exercise">Prepare your stance.</div>
    <div class="btn-container">
      <button class="nav-btn" onclick="prevExercise()">Back</button>
      <button id="start-btn" onclick="startRoutine()">Start</button>
      <button id="pause-btn" onclick="togglePause()">Pause</button>
      <button class="nav-btn" onclick="nextExercise()">Next</button>
    </div>
  </div>

  <script>
    let audioCtx;
    function initAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }
    function playBeep(type) {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      osc.connect(gainNode); gainNode.connect(audioCtx.destination);
      if (type === 'short') { 
        osc.frequency.setValueAtTime(600, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
      } else if (type === 'long') { 
        osc.type = 'square'; osc.frequency.setValueAtTime(750, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
        osc.start(); osc.stop(audioCtx.currentTime + 0.4);
      }
    }

    const baseExercises = [
      { name: "High & Low Jab/Cross", round: 1 }, { name: "Hook/Uppercut/Front Knee", round: 1 }, { name: "Triple Jab/Cross/Back Knee", round: 1 }, { name: "Hook Elbow/Down Elbow", round: 1 },
      { name: "Jab/Over-Top Elbow/Crescent Kick", round: 2 }, { name: "Superman Punch/4-Punch Sprawl", round: 2 }, { name: "Lead Upper/Hook Elbow/Snap Kick", round: 2 }, { name: "Sprawl/Power Knees/Hook & Upper Elbow", round: 2 },
      { name: "Upper Back Elbow/Hook Elbow/Back Kick", round: 3 }, { name: "Jab/Cross/Sprawl/Hook/Upper/Sprawl", round: 3 }, { name: "Push Kick/Snap Kick", round: 3 }, { name: "Hook/Upper/Hook/Upper/Sprawl", round: 3 },
      { name: "Front Leg Check/Snap Kick/Superman", round: 4 }, { name: "Jab/Cross/Sprawl/Scramble 180°", round: 4 }, { name: "Jab/Cross/Hook Elbow/Over-Top Elbow", round: 4 }, { name: "Gladiator/Sprawl/4-Punch Combo", round: 4 }
    ];

    const sequence = [{ name: "GET READY", time: 10, round: "PREP", isRest: true }];
    for (let r = 1; r <= 4; r++) {
      const roundEx = baseExercises.filter(ex => ex.round === r);
      for (let i = 0; i < roundEx.length; i++) {
        sequence.push({ name: roundEx[i].name + " (Side 1)", time: 30, round: "Round " + r, isRest: false });
        sequence.push({ name: "SWITCH LEADS!", time: 5, round: "Round " + r, isRest: true, isSwitch: true });
        sequence.push({ name: roundEx[i].name + " (Side 2)", time: 30, round: "Round " + r, isRest: false, colorAlert: true });
        if (i < roundEx.length - 1) sequence.push({ name: "TRANSITION", time: 10, round: "Round " + r, isRest: true });
      }
      if (r < 4) sequence.push({ name: "REST & RECOVER", time: 60, round: "Round " + r + " Done", isRest: true });
    }
    sequence.push({ name: "WORKOUT COMPLETE!", time: 0, round: "VICTORY", isRest: true });

    let currentIndex = 0, timeLeft = sequence[0].time, timerInterval, isRunning = false, isPaused = false;
    const circle = document.getElementById('moving-bar'), circumference = 85 * 2 * Math.PI;
    circle.style.strokeDasharray = `${circumference} ${circumference}`;

    function updateDisplay() {
      const cur = sequence[currentIndex];
      document.getElementById('round').innerText = cur.round;
      const exDiv = document.getElementById('exercise');
      exDiv.innerText = cur.name;
      
      let color = "#ffffff";
      if (cur.colorAlert || cur.isSwitch) color = "#ff3333";
      else if (cur.isRest && cur.time > 0) color = "#00ccff";
      else if (cur.time === 0) color = "#00ff00";
      
      exDiv.style.color = color; circle.style.stroke = color;
      document.getElementById('timer').innerText = `${Math.floor(timeLeft / 60).toString().padStart(2, '0')}:${(timeLeft % 60).toString().padStart(2, '0')}`;
      circle.style.strokeDashoffset = cur.time > 0 ? circumference - (timeLeft / cur.time) * circumference : 0;
      
      let nextText = "Finish Strong!";
      for (let i = currentIndex + 1; i < sequence.length; i++) {
        if (!sequence[i].isRest && !sequence[i].name.includes("Side 2")) {
          nextText = "Next: " + sequence[i].name.replace(" (Side 1)", ""); break;
        }
      }
      document.getElementById('next-exercise').innerText = cur.time === 0 ? "" : nextText;
    }

    function tick() {
      if (timeLeft === 3 || timeLeft === 2 || timeLeft === 1) playBeep('short');
      else if (timeLeft === 0 && currentIndex < sequence.length - 1) playBeep('long');

      if (timeLeft <= 0) {
        currentIndex++;
        if (currentIndex >= sequence.length - 1) {
          clearInterval(timerInterval); timeLeft = 0; updateDisplay();
          document.getElementById('pause-btn').style.display = 'none'; return;
        }
        timeLeft = sequence[currentIndex].time;
        circle.style.transition = 'none';
        setTimeout(() => { circle.style.transition = 'stroke-dashoffset 1s linear, stroke 0.3s ease'; }, 50);
      } else { timeLeft--; }
      updateDisplay();
    }

    function startRoutine() {
      initAudio(); document.getElementById('start-btn').style.display = 'none';
      document.getElementById('pause-btn').style.display = 'inline-block';
      isRunning = true; updateDisplay(); timerInterval = setInterval(tick, 1000);
    }

    function togglePause() {
      if (!isRunning) return;
      initAudio(); isPaused = !isPaused;
      const btn = document.getElementById('pause-btn');
      if (isPaused) {
        clearInterval(timerInterval); btn.innerText = "Resume"; btn.style.backgroundColor = "#ff9900";
        document.getElementById('timer').style.color = "#ff9900"; circle.style.stroke = "#ff9900";
      } else {
        timerInterval = setInterval(tick, 1000); btn.innerText = "Pause"; btn.style.backgroundColor = "#444444";
        document.getElementById('timer').style.color = "#ffffff"; updateDisplay();
      }
    }

    function jump(index) {
      currentIndex = index; timeLeft = sequence[currentIndex].time;
      circle.style.transition = 'none';
      setTimeout(() => { circle.style.transition = 'stroke-dashoffset 1s linear, stroke 0.3s ease'; updateDisplay(); }, 50);
    }
    function nextExercise() { if (currentIndex < sequence.length - 2) jump(currentIndex + 1); }
    function prevExercise() { if (currentIndex > 0) jump(currentIndex - 1); }
    updateDisplay();
  </script>
</body>
</html>
